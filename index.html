<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Przewodnik Kulinarny</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ffc107"> <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        /* Drobne poprawki wizualne dla aplikacji mobilnej */
        body { background-color: #f8f9fa; }
        #map { height: 300px; width: 100%; border-radius: 8px; z-index: 1; }
        #photoPreview { max-height: 300px; border-radius: 8px; object-fit: cover; width: 100%; }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark bg-warning shadow-sm sticky-top">
        <div class="container-fluid justify-content-center">
            <span class="navbar-brand mb-0 h1 text-dark fw-bold">🍔 Przewodnik Kulinarny</span>
        </div>
    </nav>

    <main class="container mt-4 mb-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card shadow-sm border-0">
                    <div class="card-body p-4 text-center">
                        <h5 class="card-title mb-4">Gdzie zjadłeś coś dobrego?</h5>

                        <input type="file" accept="image/*" capture="environment" id="cameraInput" class="d-none">
                        <button id="openCameraBtn" class="btn btn-warning btn-lg w-100 mb-3 text-dark fw-bold shadow-sm">
                            📸 Zrób zdjęcie potrawy
                        </button>

                        <div class="mb-3">
                            <img id="photoPreview" class="d-none shadow-sm" alt="Podgląd potrawy">
                        </div>

                        <div id="map" class="d-none mb-3 shadow-sm border"></div>

                        <button id="shareBtn" class="btn btn-success btn-lg w-100 d-none shadow-sm">
                            🚀 Udostępnij znajomym
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script src="app.js"></script>

</body>
</html>
